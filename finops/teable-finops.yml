specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Teable
providerId: teable
created: '2026-06-20'
modified: '2026-06-20'
reconciled: true
tags:
- No-Code
- Database
- Airtable Alternative
- Postgres
- Open Source
