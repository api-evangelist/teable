specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Teable
providerId: teable
created: '2026-06-20'
modified: '2026-06-20'
reconciled: true
tags:
- No-Code
- Database
- Airtable Alternative
- Postgres
- Open Source
- Plans
description: >-
  Teable offers a fully open-source Community Edition (AGPL-3.0) that can be
  self-hosted for free, plus a managed cloud with per-seat tiers: Free, Pro,
  and Business, with an Enterprise track. Cloud tiers scale on rows, automation
  runs, AI credits, and attachment storage, with add-on subscriptions for
  credits, automation runs, records, and storage on Pro and above. The REST API
  is available across cloud and self-hosted deployments.
notes: >-
  Cloud prices reflect the published teable.ai/pricing page (per-seat, billed
  yearly where noted). Self-hosting the open-source Community Edition has no
  license fee; you pay only your own infrastructure. Verify current limits and
  prices on the pricing page during reconciliation.
sources:
- https://teable.io
- https://teable.ai/pricing
- https://github.com/teableio/teable
- https://help.teable.ai/en/api-doc/overview
plans:
- id: teable-self-hosted
  name: Self-Hosted (Community Edition)
  type: open_source
  description: >-
    Open-source Community Edition licensed AGPL-3.0, self-hosted on your own
    Postgres and infrastructure with full access to the REST API. No license
    fee; you provide and pay for your own hosting.
  entries:
  - label: Community Edition License
    name: community_edition
    type: flat
    metric: license
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: $0 (AGPL-3.0, self-hosted; infrastructure costs are yours)
    userMultiplied: false
  elements:
  - name: Spaces
  - name: Bases
  - name: Tables
  - name: Fields
  - name: Records
  - name: Views
  - name: Attachments
  - name: REST API
- id: teable-free
