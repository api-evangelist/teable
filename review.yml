actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No public streaming API is documented. The catalog models the documented
    REST surface only (OpenAPI + Postman + Open Collection). Realtime
    collaboration is noted as an internal, undocumented transport and is not
    represented as an AsyncAPI artifact.
