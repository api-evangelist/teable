aid: teable
name: Teable
review:
  question: Does Teable expose a documented public WebSocket / realtime streaming API?
  answer: false
  date: '2026-06-20'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    Teable's web client uses realtime collaboration internally (operational
    transforms over a socket/ShareDB-style channel) to keep grids in sync
    between collaborators. However, this realtime transport is an internal
    application detail and is NOT documented as a public, consumable API in the
    Teable API reference. The documented developer surface is REST only. Because
    no public WebSocket or SSE API is documented for third-party use, no
    AsyncAPI document was authored.
findings:
  summary: |
    Teable publishes a documented public REST API (OpenAPI / Swagger) under the
    base path /api on Teable Cloud (https://app.teable.io/api,
    https://app.teable.ai/api) and on self-hosted Community Edition instances.
    It covers spaces, bases, tables, fields, records (full CRUD with filter /
    orderBy / search / projection / pagination), views, and attachments.
    Authentication is Bearer token (personal access token or OAuth access
    token). Realtime collaboration exists in the product UI but is not exposed
    or documented as a public streaming API, so it is out of scope for AsyncAPI
    modeling under current API Evangelist scope.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://app.teable.io/api
      documented: true
    - protocol: REST
      scheme: https
      baseURL: https://app.teable.ai/api
      documented: true
      note: Alternate cloud host; teable.io redirects to teable.ai.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: >-
        Realtime collaboration is used internally by the web client but is not
        documented as a public API for third-party consumption.
